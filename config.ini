[camera]
# Path to the TFLite model and labels
model_path   = /home/mendel/maildetection/all_models/mobilenet_ssd_v2_coco_quant_postprocess_edgetpu.tflite
label_path   = /home/mendel/maildetection/all_models/coco_labels.txt
# RTSP stream URL of the camera
rtsp_url     = rtsp://<IP_ADDRESS>:554/Streaming/Channels/102
reader_fps = 8
detect_fps = 5
watchdog_seconds = 8
reconnect_delay = 2
open_timeout_ms = 5000
read_timeout_ms = 5000

[detectie]
# Minimum confidence during the day and at night (0.0 - 1.0)
min_confidence_day   = 0.75
min_confidence_night = 0.55
night_interval = 5.0
# Labels to detect (comma-separated)
target_labels        = persoon,hond,kat,vogel

[mqtt]
broker = <IP_ADDRESS>
port   = <port>
user   = <user> 
pw     = <password>
topic  = coral/maildetection
interval = 3.0

[mail]
# Set enabled to false to disable email
enabled     = true
smtp_server = <IP_ADDRESS>
smtp_port   = 25
from_addr   = <email_address>
from_name   = Coral AI
to_addr     = <email_address>

[post_detectie]
# Mailbox zone in AI coordinates (0-300): xmin,ymin,xmax,ymax
mailbox_zone         = 45,120,120,210
# Exclude zone: top-right, ignore passersby
exclude_zone         = 200,0,350,40
# Arrival: person must start on the right (cx >) and at the top (cy <)
arrive_min_cx        = 140
arrive_max_cy        = 130
# Departure: person must return to the right (cx >) and top (cy <)
depart_min_cx        = 140
depart_max_cy        = 120
# Dwell time at the mailbox (seconds)
mailbox_dwell_min    = 0.8
mailbox_dwell_max    = 4.0
# Minimum walking time to the mailbox (seconds)
approach_min_seconds = 1.0
# Cooldown between two delivery notifications (seconds)
post_cooldown        = 60.0
# Require actual leftward/rightward movement (not just position) before
# confirming arrival at / departure from the mailbox. Set to false if this
# turns out too strict for your camera angle.
require_direction_check = true

[tracker]
max_disappeared  = 45
reset_seconds    = 600
max_trace_points = 300

[debug]
# debug overlay
draw_debug        = false
draw_traces_debug = true
log_verbose = false
log_interval = 2